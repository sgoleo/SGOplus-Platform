name: Deploy Laravel Project

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to CoreServer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Execute SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd SGOplus-Platform
            git pull origin main
            
            # Laravel 11 deployment commands
            # Using php and composer directly (assuming they are in PATH and version is correct)
            php artisan down || true
            composer install --no-interaction --prefer-dist --optimize-autoloader
            php artisan migrate --force
            
            # Frontend build (if needed on server)
            if [ -d "frontend" ]; then
              cd frontend
              # Ensure node version 24 is used if possible on server, 
              # otherwise this depends on server environment.
              npm install
              npm run build
              cd ..
            fi
            
            php artisan optimize
            php artisan up
